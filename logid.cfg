devices: (
{
      name: "MX Master 3S";
#     smartshift:
#     {
#         on: true;
#         threshold: 30;
#     };
     hiresscroll:
     {
         hires: false;
         invert: false;
         target: false;
     };
     dpi: 1200;

     buttons: (
         {
             cid: 0xc3;
             action =
             {
                 type: "Gestures";
                 gestures: (
                     {
                         direction: "Up";
                         mode: "OnRelease";
                         action =
                         {
                             type: "Keypress";
                             keys: ["KEY_UP"];
                         };
                     },
                     {
                         direction: "Down";
                         mode: "OnRelease";
                         action =
                         {
                             type: "Keypress";
                             keys: ["KEY_DOWN"];
                         };
                     },
                     {
                         direction: "Left";
                         mode: "OnRelease";
                         action =
                         {
                             type: "KeyPress";
                             keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_LEFT"];
                         };
                     },
                     {
                         direction: "Right";
                         mode: "OnRelease";
                         action =
                         {
                            type: "KeyPress";
                             keys: ["KEY_LEFTCTRL", "KEY_LEFTALT", "KEY_RIGHT"];
                         };
                     },
                     {
                         direction: "None";
                         mode: "OnRelease";
                         action =
                         {
                             type: "Keypress";
                             keys: ["KEY_LEFTMETA", "KEY_W"];
                         };
                     }
                 );
             };
         },
         {
             cid: 0xc4;
             action =
             {
                  type = "ToggleSmartshift"; 
             };
         }
     );
}
);
